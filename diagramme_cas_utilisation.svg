<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <style>
    .title { font: 700 26px Arial, sans-serif; fill: #1f2937; }
    .label { font: 600 18px Arial, sans-serif; fill: #111827; }
    .text { font: 16px Arial, sans-serif; fill: #111827; }
    .small { font: 15px Arial, sans-serif; fill: #111827; }
    .system { fill: #f8fafc; stroke: #334155; stroke-width: 2.5; rx: 18; ry: 18; }
    .usecase { fill: #ffffff; stroke: #2563eb; stroke-width: 2; }
    .line { stroke: #475569; stroke-width: 2; fill: none; }
    .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 8 6; fill: none; }
    .actor { stroke: #111827; stroke-width: 2.5; fill: none; }
  </style>

  <text x="800" y="40" text-anchor="middle" class="title">Diagramme de cas d'utilisation</text>

  <rect x="240" y="80" width="1120" height="840" class="system"/>

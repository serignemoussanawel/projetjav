<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="studentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#27AE60;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#229954;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Head -->
  <circle cx="100" cy="60" r="20" fill="#F4A460"/>
  
  <!-- Cap/Mortarboard -->
  <rect x="75" y="35" width="50" height="8" fill="#2C3E50" stroke="#000" stroke-width="1" rx="2"/>
  <polygon points="100,35 120,25 80,25" fill="#2C3E50"/>
  <line x1="100" y1="35" x2="100" y2="20" stroke="#FFD700" stroke-width="2"/>
  <circle cx="110" cy="15" r="3" fill="#FFD700"/>
  
  <!-- Body -->
  <rect x="70" y="85" width="60" height="50" fill="url(#studentGrad)" stroke="#1E5631" stroke-width="2" rx="5"/>
  
  <!-- Arms -->
  <rect x="50" y="95" width="20" height="12" fill="#F4A460" rx="6"/>
  <rect x="130" y="95" width="20" height="12" fill="#F4A460" rx="6"/>
  
  <!-- Legs -->
  <rect x="80" y="140" width="10" height="35" fill="#2C3E50"/>
  <rect x="110" y="140" width="10" height="35" fill="#2C3E50"/>
  
  <!-- Shoes -->
  <ellipse cx="85" cy="177" rx="7" ry="5" fill="#000"/>
  <ellipse cx="115" cy="177" rx="7" ry="5" fill="#000"/>
  
  <!-- Smile -->
  <path d="M 95 70 Q 100 75 105 70" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>

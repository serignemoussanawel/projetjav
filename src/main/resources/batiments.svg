<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="buildingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Building shape -->
  <rect x="50" y="60" width="100" height="100" fill="url(#buildingGrad)" rx="5"/>
  
  <!-- Windows -->
  <rect x="60" y="75" width="15" height="15" fill="#FFD700"/>
  <rect x="85" y="75" width="15" height="15" fill="#FFD700"/>
  <rect x="110" y="75" width="15" height="15" fill="#FFD700"/>
  
  <rect x="60" y="100" width="15" height="15" fill="#FFD700"/>
  <rect x="85" y="100" width="15" height="15" fill="#FFD700"/>
  <rect x="110" y="100" width="15" height="15" fill="#FFD700"/>
  
  <rect x="60" y="125" width="15" height="15" fill="#FFD700"/>
  <rect x="85" y="125" width="15" height="15" fill="#FFD700"/>
  <rect x="110" y="125" width="15" height="15" fill="#FFD700"/>
  
  <!-- Door -->
  <rect x="88" y="140" width="24" height="20" fill="#8B4513"/>
  
  <!-- Roof -->
  <polygon points="50,60 100,30 150,60" fill="#E74C3C"/>
</svg>
